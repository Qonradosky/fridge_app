<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7fbf7" />
    <title>Lodowka wirtualna</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-view" id="authView" hidden>
        <div class="auth-panel">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
          </div>
          <h1>Lodowka wirtualna</h1>
          <form id="pinForm" class="pin-form">
            <label for="pinInput">Kod dostepu</label>
            <div class="pin-row">
              <input id="pinInput" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required />
              <button class="primary-button" type="submit">Wejdz</button>
            </div>
            <p id="pinHint" class="muted"></p>
          </form>
        </div>
      </section>

      <section class="fridge-view" id="fridgeView" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">Domowa lista</p>
            <h1>Lodowka wirtualna</h1>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" id="themeToggleButton" type="button" title="Tryb ciemny" aria-label="Tryb ciemny" aria-pressed="false">
              <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6.8 6.8 0 0 0 8.5 8.5A8.4 8.4 0 1 1 12 3Z"></path></svg>
              <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
            </button>
            <button class="icon-button" id="notifyButton" type="button" title="Powiadomienia" aria-label="Powiadomienia">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </button>
            <button class="icon-button" id="lockButton" type="button" title="Zablokuj" aria-label="Zablokuj">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="11" width="16" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            </button>
          </div>
        </header>

        <nav class="category-tabs" aria-label="Glowne kategorie">
          <button class="category-tab active" type="button" data-category-group="food" aria-pressed="true">Spozywcze</button>
          <button class="category-tab" type="button" data-category-group="chemistry" aria-pressed="false">Dom i chemia</button>
          <button class="category-tab" type="button" data-category-group="utility" aria-pressed="false">Uzyteczne zapasy</button>
        </nav>

        <section class="stats-grid" aria-label="Podsumowanie">
          <article class="stat-card">
            <span class="stat-label">Produkty</span>
            <strong id="totalCount">0</strong>
          </article>
          <article class="stat-card warning">
            <span class="stat-label">Koncza termin</span>
            <strong id="soonCount">0</strong>
          </article>
          <article class="stat-card danger">
            <span class="stat-label">Po terminie</span>
            <strong id="expiredCount">0</strong>
          </article>
          <article class="stat-card value">
            <span class="stat-label">Wartosc</span>
            <strong id="totalValue">0 zl</strong>
          </article>
        </section>

        <section class="workspace">
          <form id="foodForm" class="food-form">
            <input type="hidden" id="foodId" />
            <div class="form-header">
              <h2 id="formTitle">Dodaj produkt</h2>
              <button id="cancelEditButton" class="ghost-button" type="button" hidden>Anuluj</button>
            </div>
            <label>
              Nazwa
              <input id="nameInput" required maxlength="80" placeholder="np. Jogurt naturalny" />
            </label>
            <div class="form-grid">
              <label>
                Cena zakupu
                <input id="priceInput" required type="number" min="0" step="0.01" placeholder="0.00" />
              </label>
              <label>
                Ilosc / gramatura
                <div class="unit-row">
                  <input id="weightInput" required type="number" min="1" step="1" placeholder="np. 500" />
                  <select id="unitInput" aria-label="Jednostka">
                    <option value="g/ml">g/ml</option>
                    <option value="szt">szt</option>
                  </select>
                </div>
              </label>
            </div>
            <div class="form-grid">
              <label>
                Data zakupu
                <input id="purchaseDateInput" required type="date" />
              </label>
              <label>
                Termin przydatnosci
                <input id="expirationDateInput" required type="date" />
              </label>
            </div>
            <label class="checkbox-label">
              <input id="noExpirationInput" type="checkbox" />
              Produkt bez terminu waznosci
            </label>
            <div class="form-grid">
              <label class="checkbox-label">
                <input id="frozenInput" type="checkbox" />
                Produkt zamrozony
              </label>
              <label>
                Data zamrozenia
                <input id="frozenDateInput" type="date" disabled />
              </label>
            </div>
            <label>
              Kategoria
              <select id="categoryInput">
                <optgroup label="Spozywcze">
                  <option>Nabial</option>
                  <option>Warzywa</option>
                  <option>Owoce</option>
                  <option>Mieso</option>
                  <option>Ryby</option>
                  <option>Pieczywo</option>
                  <option>Produkty suche</option>
                  <option>Konserwy</option>
                  <option>Mrozonki</option>
                  <option>Gotowe dania</option>
                  <option>Napoje</option>
                  <option>Przyprawy</option>
                  <option>Slodycze i przekaski</option>
                </optgroup>
                <optgroup label="Dom i chemia">
                  <option>Chemia gospodarcza</option>
                  <option>Sprzatanie</option>
                  <option>Higiena</option>
                  <option>Papierowe</option>
                  <option>Worki i folie</option>
                  <option>Kosmetyki</option>
                </optgroup>
                <optgroup label="Uzyteczne zapasy">
                  <option>Leki i suplementy</option>
                  <option>Artykuly dla zwierzat</option>
                  <option>Baterie</option>
                  <option>Narzedzia i drobiazgi</option>
                  <option>Inne zapasy</option>
                  <option>Inne</option>
                </optgroup>
              </select>
            </label>
            <label>
              Notatka
              <textarea id="notesInput" rows="3" maxlength="180" placeholder="np. otwarte w sobote"></textarea>
            </label>
            <button class="primary-button wide" type="submit">Zapisz produkt</button>
          </form>

          <section class="list-panel">
            <div class="list-toolbar">
              <div class="search-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                <input id="searchInput" type="search" placeholder="Szukaj produktu" />
              </div>
              <select id="filterInput" aria-label="Filtr">
                <option value="all">Wszystkie</option>
                <option value="fresh">Swieze</option>
                <option value="soon">Koncza termin</option>
                <option value="expired">Po terminie</option>
                <option value="no-expiry">Bez terminu</option>
                <option value="frozen">Zamrozone</option>
              </select>
              <button class="ghost-button toolbar-button" id="shoppingToggleButton" type="button">Lista zakupow</button>
            </div>
            <details class="subcategory-panel">
              <summary>Podkategorie</summary>
              <div id="subcategoryFilters" class="subcategory-filters"></div>
            </details>
            <section class="shopping-panel" id="shoppingPanel" hidden>
              <div class="shopping-header">
                <h2>Lista zakupow</h2>
                <button class="ghost-button" id="seedShoppingButton" type="button">Z produktow</button>
              </div>
              <form id="shoppingForm" class="shopping-form">
                <input id="shoppingNameInput" list="articleSuggestions" placeholder="np. Mleko" required />
                <input id="shoppingAmountInput" type="number" min="1" step="1" placeholder="ilosc" />
                <select id="shoppingUnitInput" aria-label="Jednostka listy zakupow">
                  <option value="">bez ilosci</option>
                  <option value="g/ml">g/ml</option>
                  <option value="szt">szt</option>
                </select>
                <button class="primary-button" type="submit">Dodaj</button>
              </form>
              <datalist id="articleSuggestions"></datalist>
              <div id="shoppingList" class="shopping-list"></div>
            </section>
            <div id="alerts" class="alerts"></div>
            <div id="foodList" class="food-list"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="foodItemTemplate">
      <article class="food-item">
        <div class="food-main">
          <span class="status-dot"></span>
          <div>
            <h3></h3>
            <p class="food-meta"></p>
          </div>
        </div>
        <div class="food-details"></div>
        <div class="food-actions">
          <button class="icon-button edit" type="button" title="Edytuj" aria-label="Edytuj">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
          </button>
          <button class="icon-button shop" type="button" title="Dodaj do listy zakupow" aria-label="Dodaj do listy zakupow">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h8.62a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
          </button>
          <button class="icon-button delete" type="button" title="Usun" aria-label="Usun">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
          </button>
        </div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
